{% extends 'base.html' %}

{% block content %}
<div class="container-fluid py-4">

    <div class="card shadow-sm border-0">
        <div class="card-header bg-success text-white">
            <h4 class="mb-0">
                <i class="fas fa-user-shield"></i>
                {{ title }}
            </h4>
        </div>

        <div class="card-body">

            <form method="post" novalidate>
                {% csrf_token %}

                {{ form.media }}

                {% for field in form %}
                    <div class="mb-3">
                        <label class="form-label fw-bold">{{ field.label }}</label>

                        {% if field.name == "permission" %}
                            <div class="permissions-box">
                                {{ field }}
                            </div>
                        {% else %}
                            {{ field }}
                        {% endif %}

                        {% if field.errors %}
                            <div class="text-danger small mt-1">
                                {{ field.errors }}
                            </div>
                        {% endif %}
                    </div>
                {% endfor %}

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-success">
                        <i class="fas fa-save"></i>
                        {{ button_text }}
                    </button>

                    <a href="{% url 'list_permission_group' %}" class="btn btn-secondary">
                        رجوع
                    </a>
                </div>
            </form>

        </div>
    </div>

</div>

<style>
    .permissions-box {
        max-height: 430px;
        overflow-y: auto;
        overflow-x: hidden;
        border: 1px solid #ced4da;
        border-radius: 10px;
        padding: 15px;
        background: #ffffff;
        direction: rtl;
    }

    .permissions-box ul {
        list-style: none;
        padding: 0;
        margin: 0;
        display: grid;
        grid-template-columns: repeat(3, minmax(220px, 1fr));
        gap: 10px;
    }

    .permissions-box li {
        background: #f8f9fa;
        border: 1px solid #e5e5e5;
        border-radius: 8px;
        padding: 8px 10px;
        font-weight: 600;
        color: #212529;
    }

    .permissions-box label {
        cursor: pointer;
        width: 100%;
        margin: 0;
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .permissions-box input[type="checkbox"] {
        transform: scale(1.15);
        cursor: pointer;
    }

    @media (max-width: 1200px) {
        .permissions-box ul {
            grid-template-columns: repeat(2, minmax(220px, 1fr));
        }
    }

    @media (max-width: 768px) {
        .permissions-box ul {
            grid-template-columns: 1fr;
        }
    }
</style>
{% endblock %}
